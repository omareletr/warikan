[build]
  command = "npm run build"
  publish = ".next"

[context.staging]
  command = "npm run build"
  [context.staging.environment]
    NEXT_PUBLIC_IS_STAGING = "true"
    NEXT_PUBLIC_APP_URL = "https://staging--warikan0.netlify.app"

[context.production]
  command = "npm run build"
  [context.production.environment]
    NEXT_PUBLIC_APP_URL = "https://warikan0.netlify.app"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/api/room/*/subscribe"
  [headers.values]
    X-Accel-Buffering = "no"
    Cache-Control = "no-cache"
